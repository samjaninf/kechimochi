name: "Android Release Build"

on:
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  CARGO_TERM_COLOR: always

jobs:
  android-release-build:
    if: startsWith(github.head_ref, 'release/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: validate release version
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_HEAD_REF}" =~ ^release/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            BRANCH_VERSION="${BASH_REMATCH[1]}"
          else
            echo "Expected release branch name release/vX.Y.Z, got ${GITHUB_HEAD_REF}" >&2
            exit 1
          fi

          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO_VERSION=$(node -e "const fs = require('fs'); const toml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8'); const match = toml.match(/\\[package\\][\\s\\S]*?^version = \\\"([^\\\"]+)\\\"/m); if (!match) { process.exit(1); } console.log(match[1]);")

          if [[ "$PACKAGE_VERSION" != "$TAURI_VERSION" || "$PACKAGE_VERSION" != "$CARGO_VERSION" ]]; then
            echo "Version files do not match:" >&2
            echo "package.json: ${PACKAGE_VERSION}" >&2
            echo "src-tauri/tauri.conf.json: ${TAURI_VERSION}" >&2
            echo "src-tauri/Cargo.toml: ${CARGO_VERSION}" >&2
            exit 1
          fi

          if [[ "$PACKAGE_VERSION" != "$BRANCH_VERSION" ]]; then
            echo "Release branch version ${BRANCH_VERSION} does not match checked-in app version ${PACKAGE_VERSION}" >&2
            exit 1
          fi

          echo "version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: setup node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: cache rust dependencies
        uses: swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          workspaces: './src-tauri -> target'

      - name: setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: setup android sdk
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
        with:
          packages: 'platforms;android-36 build-tools;35.0.0 build-tools;36.0.0'

      - name: build android release apk
        env:
          KECHIMOCHI_GOOGLE_ANDROID_CLIENT_ID: release-smoke-test
          VITE_APP_VERSION: ${{ steps.release.outputs.version }}
          VITE_APP_CHANNEL: release
          VITE_RELEASE_STAGE: beta
        run: npm run tauri -- android build --apk --ci --target aarch64
