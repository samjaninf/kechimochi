name: "Publish AppImage"

on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed

jobs:
  publish-linux:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.head_repository.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm install

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install system dependencies (linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            jq
          cargo install tauri-cli --git https://github.com/tauri-apps/tauri --branch feat/truly-portable-appimage

      - name: Set dynamic version
        id: versioning
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          VERSION="0.0.0-dev.${SHA_SHORT}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          jq ".version = \"$VERSION\"" package.json > package.json.tmp && mv package.json.tmp package.json
          jq ".version = \"$VERSION\"" src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: build tauri app
        working-directory: ./src-tauri
        env:
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: 1
          VITE_APP_VERSION: ${{ steps.versioning.outputs.VERSION }}
        run: cargo tauri build --bundles appimage --verbose

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kechimochi-appimage-${{ steps.versioning.outputs.VERSION }}
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  publish-windows:
    runs-on: windows-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.head_repository.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm install

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Set dynamic version
        id: versioning
        shell: bash
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          VERSION="0.0.0-dev.${SHA_SHORT}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          
          # Use hash version for package.json (usually okay for web build)
          jq ".version = \"$VERSION\"" package.json > package.json.tmp && mv package.json.tmp package.json
          # MSI MUST use numeric version, so we use 0.0.0 for the internal metadata
          jq ".version = \"0.0.0\"" src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: build tauri app
        env:
          VITE_APP_VERSION: ${{ steps.versioning.outputs.VERSION }}
        run: npm run tauri build -- --bundles msi --verbose

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kechimochi-windows-${{ steps.versioning.outputs.VERSION }}
          path: src-tauri/target/release/bundle/msi/*.msi
