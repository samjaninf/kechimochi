name: "Publish Dev Artifacts"

on:
  workflow_call:
    secrets:
      KECHIMOCHI_GOOGLE_CLIENT_ID:
        required: true
      KECHIMOCHI_GOOGLE_CLIENT_SECRET:
        required: true
      KECHIMOCHI_GOOGLE_ANDROID_CLIENT_ID:
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      head_sha: ${{ steps.metadata.outputs.head_sha }}
      display_version: ${{ steps.metadata.outputs.display_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: derive dev build metadata
        id: metadata
        shell: bash
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          HEAD_SHA=$(git rev-parse HEAD)
          SHA_SHORT=$(git rev-parse --short HEAD)
          DISPLAY_VERSION="${BASE_VERSION}-dev.${SHA_SHORT}"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "display_version=${DISPLAY_VERSION}" >> "$GITHUB_OUTPUT"

  publish-web-linux:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}
          persist-credentials: false

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: cache rust dependencies
        uses: swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          workspaces: './src-tauri -> target'

      - name: install system dependencies (linux web)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config

      - name: build web release artifacts
        env:
          VITE_APP_VERSION: ${{ needs.prepare.outputs.display_version }}
          VITE_APP_CHANNEL: dev
          VITE_RELEASE_STAGE: beta
        run: npm run web:release

      - name: package web artifact payload
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.display_version }}"
          New-Item -ItemType Directory -Force -Path "release-web/kechimochi-web-linux-$version" | Out-Null
          Copy-Item -Recurse dist "release-web/kechimochi-web-linux-$version/dist"
          Copy-Item src-tauri/target/release/web_server "release-web/kechimochi-web-linux-$version/web_server"
          Copy-Item README.md "release-web/kechimochi-web-linux-$version/README.md"

      - name: upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: kechimochi-web-linux-${{ needs.prepare.outputs.display_version }}
          path: release-web/kechimochi-web-linux-${{ needs.prepare.outputs.display_version }}/

  publish-web-windows:
    runs-on: windows-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}
          persist-credentials: false

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: cache rust dependencies
        uses: swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          workspaces: './src-tauri -> target'

      - name: build web release artifacts
        env:
          VITE_APP_VERSION: ${{ needs.prepare.outputs.display_version }}
          VITE_APP_CHANNEL: dev
          VITE_RELEASE_STAGE: beta
        run: npm run web:release

      - name: package web artifact payload
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.display_version }}"
          New-Item -ItemType Directory -Force -Path "release-web/kechimochi-web-windows-$version" | Out-Null
          Copy-Item -Recurse dist "release-web/kechimochi-web-windows-$version/dist"
          Copy-Item src-tauri/target/release/web_server.exe "release-web/kechimochi-web-windows-$version/web_server.exe"
          Copy-Item README.md "release-web/kechimochi-web-windows-$version/README.md"

      - name: upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: kechimochi-web-windows-${{ needs.prepare.outputs.display_version }}
          path: release-web/kechimochi-web-windows-${{ needs.prepare.outputs.display_version }}/

  publish-web-macos:
    runs-on: macos-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}
          persist-credentials: false

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: cache rust dependencies
        uses: swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          workspaces: './src-tauri -> target'

      - name: build web release artifacts
        env:
          VITE_APP_VERSION: ${{ needs.prepare.outputs.display_version }}
          VITE_APP_CHANNEL: dev
          VITE_RELEASE_STAGE: beta
        run: npm run web:release

      - name: package web artifact payload
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.display_version }}"
          DEST="release-web/kechimochi-web-macos-${VERSION}"
          mkdir -p "$DEST"
          cp -R dist "$DEST/dist"
          cp src-tauri/target/release/web_server "$DEST/web_server"
          cp README.md "$DEST/README.md"

      - name: upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: kechimochi-web-macos-${{ needs.prepare.outputs.display_version }}
          path: release-web/kechimochi-web-macos-${{ needs.prepare.outputs.display_version }}/

  publish-linux:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}
          persist-credentials: false

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: cache rust dependencies
        uses: swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          workspaces: './src-tauri -> target'

      - name: install system dependencies (linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
          cargo install tauri-cli --git https://github.com/tauri-apps/tauri --branch feat/truly-portable-appimage

      - name: build tauri app
        working-directory: ./src-tauri
        env:
          KECHIMOCHI_GOOGLE_CLIENT_ID: ${{ secrets.KECHIMOCHI_GOOGLE_CLIENT_ID }}
          KECHIMOCHI_GOOGLE_CLIENT_SECRET: ${{ secrets.KECHIMOCHI_GOOGLE_CLIENT_SECRET }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: 1
          VITE_APP_VERSION: ${{ needs.prepare.outputs.display_version }}
          VITE_APP_CHANNEL: dev
          VITE_RELEASE_STAGE: beta
        run: cargo tauri build --bundles appimage --verbose

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kechimochi-appimage-${{ needs.prepare.outputs.display_version }}
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  publish-windows:
    runs-on: windows-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}
          persist-credentials: false

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: cache rust dependencies
        uses: swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          workspaces: './src-tauri -> target'

      - name: build tauri app
        env:
          KECHIMOCHI_GOOGLE_CLIENT_ID: ${{ secrets.KECHIMOCHI_GOOGLE_CLIENT_ID }}
          KECHIMOCHI_GOOGLE_CLIENT_SECRET: ${{ secrets.KECHIMOCHI_GOOGLE_CLIENT_SECRET }}
          VITE_APP_VERSION: ${{ needs.prepare.outputs.display_version }}
          VITE_APP_CHANNEL: dev
          VITE_RELEASE_STAGE: beta
        run: npm run tauri build -- --bundles msi --verbose

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kechimochi-windows-${{ needs.prepare.outputs.display_version }}
          path: src-tauri/target/release/bundle/msi/*.msi

  publish-macos:
    runs-on: macos-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}
          persist-credentials: false

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: cache rust dependencies
        uses: swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          workspaces: './src-tauri -> target'

      - name: build tauri app
        env:
          KECHIMOCHI_GOOGLE_CLIENT_ID: ${{ secrets.KECHIMOCHI_GOOGLE_CLIENT_ID }}
          KECHIMOCHI_GOOGLE_CLIENT_SECRET: ${{ secrets.KECHIMOCHI_GOOGLE_CLIENT_SECRET }}
          VITE_APP_VERSION: ${{ needs.prepare.outputs.display_version }}
          VITE_APP_CHANNEL: dev
          VITE_RELEASE_STAGE: beta
        run: npm run tauri build -- --target universal-apple-darwin --bundles dmg --verbose

      - name: rename DMG artifact
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.display_version }}"
          mkdir -p release-desktop
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -type f -name '*.dmg' | head -n 1)
          cp "$DMG" "release-desktop/kechimochi-macos-${VERSION}.dmg"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kechimochi-macos-${{ needs.prepare.outputs.display_version }}
          path: release-desktop/kechimochi-macos-${{ needs.prepare.outputs.display_version }}.dmg

  publish-android:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}
          persist-credentials: false

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: cache rust dependencies
        uses: swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          workspaces: './src-tauri -> target'

      - name: setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: setup android sdk
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
        with:
          packages: 'platforms;android-36 build-tools;35.0.0 build-tools;36.0.0'

      - name: build android apk
        env:
          KECHIMOCHI_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.KECHIMOCHI_GOOGLE_ANDROID_CLIENT_ID }}
          VITE_APP_VERSION: ${{ needs.prepare.outputs.display_version }}
          VITE_APP_CHANNEL: dev
          VITE_RELEASE_STAGE: beta
        run: npm run tauri -- android build --debug --apk --ci --target aarch64

      - name: rename APK artifact
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.display_version }}"
          mkdir -p release-mobile
          cp src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk \
            "release-mobile/kechimochi-android-${VERSION}.apk"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kechimochi-android-${{ needs.prepare.outputs.display_version }}
          path: release-mobile/kechimochi-android-${{ needs.prepare.outputs.display_version }}.apk
