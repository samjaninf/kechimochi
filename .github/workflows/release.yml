name: "Publish Release"

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  CARGO_TERM_COLOR: always

jobs:
  validate-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_stage: ${{ steps.version.outputs.release_stage }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: derive release metadata
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_stage=beta" >> "$GITHUB_OUTPUT"

      - name: validate version files
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO_VERSION=$(node -e "const fs = require('fs'); const toml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8'); const match = toml.match(/\\[package\\][\\s\\S]*?^version = \\\"([^\\\"]+)\\\"/m); if (!match) { process.exit(1); } console.log(match[1]);")
          test "$PACKAGE_VERSION" = "$VERSION"
          test "$TAURI_VERSION" = "$VERSION"
          test "$CARGO_VERSION" = "$VERSION"

      - name: ensure changelog entry exists
        run: npm run changelog:extract -- ${{ steps.version.outputs.version }} > /tmp/release-notes.md

      - name: ensure tag commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  build-release-web-linux:
    runs-on: ubuntu-latest
    needs: validate-release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: cache rust dependencies
        uses: swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          workspaces: './src-tauri -> target'

      - name: install system dependencies (linux web)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config

      - name: build web release artifacts
        env:
          VITE_APP_VERSION: ${{ needs.validate-release.outputs.version }}
          VITE_APP_CHANNEL: release
          VITE_RELEASE_STAGE: ${{ needs.validate-release.outputs.release_stage }}
        run: npm run web:release

      - name: package release asset
        shell: bash
        run: |
          VERSION="${{ needs.validate-release.outputs.version }}"
          DEST="release-web/kechimochi-web-linux-${VERSION}"
          mkdir -p "$DEST"
          cp -r dist "$DEST/dist"
          cp src-tauri/target/release/web_server "$DEST/web_server"
          cp README.md "$DEST/README.md"
          (
            cd release-web
            zip -r "kechimochi-web-linux-${VERSION}.zip" "kechimochi-web-linux-${VERSION}"
          )

      - name: upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-web-linux
          path: release-web/kechimochi-web-linux-${{ needs.validate-release.outputs.version }}.zip

  build-release-web-windows:
    runs-on: windows-latest
    needs: validate-release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: cache rust dependencies
        uses: swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          workspaces: './src-tauri -> target'

      - name: build web release artifacts
        env:
          VITE_APP_VERSION: ${{ needs.validate-release.outputs.version }}
          VITE_APP_CHANNEL: release
          VITE_RELEASE_STAGE: ${{ needs.validate-release.outputs.release_stage }}
        run: npm run web:release

      - name: package release asset
        shell: pwsh
        run: |
          $version = "${{ needs.validate-release.outputs.version }}"
          $dest = "release-web/kechimochi-web-windows-$version"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Recurse dist "$dest/dist"
          Copy-Item src-tauri/target/release/web_server.exe "$dest/web_server.exe"
          Copy-Item README.md "$dest/README.md"
          Compress-Archive -Path $dest -DestinationPath "release-web/kechimochi-web-windows-$version.zip" -Force

      - name: upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-web-windows
          path: release-web/kechimochi-web-windows-${{ needs.validate-release.outputs.version }}.zip

  build-release-web-macos:
    runs-on: macos-latest
    needs: validate-release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: cache rust dependencies
        uses: swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          workspaces: './src-tauri -> target'

      - name: build web release artifacts
        env:
          VITE_APP_VERSION: ${{ needs.validate-release.outputs.version }}
          VITE_APP_CHANNEL: release
          VITE_RELEASE_STAGE: ${{ needs.validate-release.outputs.release_stage }}
        run: npm run web:release

      - name: package release asset
        shell: bash
        run: |
          VERSION="${{ needs.validate-release.outputs.version }}"
          DEST="release-web/kechimochi-web-macos-${VERSION}"
          mkdir -p "$DEST"
          cp -R dist "$DEST/dist"
          cp src-tauri/target/release/web_server "$DEST/web_server"
          cp README.md "$DEST/README.md"
          ditto -c -k --keepParent "$DEST" "release-web/kechimochi-web-macos-${VERSION}.zip"

      - name: upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-web-macos
          path: release-web/kechimochi-web-macos-${{ needs.validate-release.outputs.version }}.zip

  build-release-linux:
    runs-on: ubuntu-latest
    needs: validate-release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: cache rust dependencies
        uses: swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          workspaces: './src-tauri -> target'

      - name: install system dependencies (linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
          cargo install tauri-cli --git https://github.com/tauri-apps/tauri --branch feat/truly-portable-appimage

      - name: build tauri app
        working-directory: ./src-tauri
        env:
          KECHIMOCHI_GOOGLE_CLIENT_ID: ${{ secrets.KECHIMOCHI_GOOGLE_CLIENT_ID }}
          KECHIMOCHI_GOOGLE_CLIENT_SECRET: ${{ secrets.KECHIMOCHI_GOOGLE_CLIENT_SECRET }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: 1
          VITE_APP_VERSION: ${{ needs.validate-release.outputs.version }}
          VITE_APP_CHANNEL: release
          VITE_RELEASE_STAGE: ${{ needs.validate-release.outputs.release_stage }}
        run: cargo tauri build --bundles appimage --verbose

      - name: rename AppImage asset
        shell: bash
        run: |
          VERSION="${{ needs.validate-release.outputs.version }}"
          mkdir -p release-desktop
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' | head -n 1)
          cp "$APPIMAGE" "release-desktop/kechimochi-linux-${VERSION}.AppImage"

      - name: upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release-desktop/kechimochi-linux-${{ needs.validate-release.outputs.version }}.AppImage

  build-release-windows:
    runs-on: windows-latest
    needs: validate-release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: cache rust dependencies
        uses: swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          workspaces: './src-tauri -> target'

      - name: build tauri app
        env:
          KECHIMOCHI_GOOGLE_CLIENT_ID: ${{ secrets.KECHIMOCHI_GOOGLE_CLIENT_ID }}
          KECHIMOCHI_GOOGLE_CLIENT_SECRET: ${{ secrets.KECHIMOCHI_GOOGLE_CLIENT_SECRET }}
          VITE_APP_VERSION: ${{ needs.validate-release.outputs.version }}
          VITE_APP_CHANNEL: release
          VITE_RELEASE_STAGE: ${{ needs.validate-release.outputs.release_stage }}
        run: npm run tauri build -- --bundles msi --verbose

      - name: rename MSI asset
        shell: pwsh
        run: |
          $version = "${{ needs.validate-release.outputs.version }}"
          New-Item -ItemType Directory -Force -Path release-desktop | Out-Null
          $msi = Get-ChildItem -Recurse -Path src-tauri/target/release/bundle/msi -Filter *.msi | Select-Object -First 1
          Copy-Item $msi.FullName "release-desktop/kechimochi-windows-$version.msi"

      - name: upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release-desktop/kechimochi-windows-${{ needs.validate-release.outputs.version }}.msi

  build-release-macos:
    runs-on: macos-latest
    needs: validate-release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: cache rust dependencies
        uses: swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          workspaces: './src-tauri -> target'

      - name: build tauri app
        env:
          KECHIMOCHI_GOOGLE_CLIENT_ID: ${{ secrets.KECHIMOCHI_GOOGLE_CLIENT_ID }}
          KECHIMOCHI_GOOGLE_CLIENT_SECRET: ${{ secrets.KECHIMOCHI_GOOGLE_CLIENT_SECRET }}
          VITE_APP_VERSION: ${{ needs.validate-release.outputs.version }}
          VITE_APP_CHANNEL: release
          VITE_RELEASE_STAGE: ${{ needs.validate-release.outputs.release_stage }}
        run: npm run tauri build -- --target universal-apple-darwin --bundles dmg --verbose

      - name: rename DMG asset
        shell: bash
        run: |
          VERSION="${{ needs.validate-release.outputs.version }}"
          mkdir -p release-desktop
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -type f -name '*.dmg' | head -n 1)
          cp "$DMG" "release-desktop/kechimochi-macos-${VERSION}.dmg"

      - name: upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: release-desktop/kechimochi-macos-${{ needs.validate-release.outputs.version }}.dmg

  build-release-android:
    runs-on: ubuntu-latest
    needs: validate-release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: cache rust dependencies
        uses: swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          workspaces: './src-tauri -> target'

      - name: setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: setup android sdk
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
        with:
          packages: 'platforms;android-36 build-tools;35.0.0 build-tools;36.0.0'

      - name: build android apk
        env:
          KECHIMOCHI_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.KECHIMOCHI_GOOGLE_ANDROID_RELEASE_CLIENT_ID }}
          VITE_APP_VERSION: ${{ needs.validate-release.outputs.version }}
          VITE_APP_CHANNEL: release
          VITE_RELEASE_STAGE: ${{ needs.validate-release.outputs.release_stage }}
        run: npm run tauri -- android build --apk --ci --target aarch64

      - name: sign android apk
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          APK=$(find src-tauri/gen/android/app/build/outputs/apk/universal/release -maxdepth 1 -type f -name '*.apk' | head -n 1)
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/kechimochi-release.jks
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" sign \
            --ks /tmp/kechimochi-release.jks \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass pass:"$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass pass:"$ANDROID_KEY_PASSWORD" \
            --out /tmp/kechimochi-android-release-signed.apk \
            "$APK"
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --print-certs /tmp/kechimochi-android-release-signed.apk

      - name: rename APK asset
        shell: bash
        run: |
          VERSION="${{ needs.validate-release.outputs.version }}"
          mkdir -p release-mobile
          cp /tmp/kechimochi-android-release-signed.apk "release-mobile/kechimochi-android-${VERSION}.apk"

      - name: upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: release-mobile/kechimochi-android-${{ needs.validate-release.outputs.version }}.apk

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - validate-release
      - build-release-web-linux
      - build-release-web-windows
      - build-release-web-macos
      - build-release-linux
      - build-release-windows
      - build-release-macos
      - build-release-android
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: generate release notes
        run: npm run changelog:extract -- ${{ needs.validate-release.outputs.version }} > release-notes.md

      - name: download linux desktop asset
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: release-assets/release-linux

      - name: download windows desktop asset
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets/release-windows

      - name: download macOS desktop asset
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: release-assets/release-macos

      - name: download android mobile asset
        uses: actions/download-artifact@v4
        with:
          name: release-android
          path: release-assets/release-android

      - name: download linux web asset
        uses: actions/download-artifact@v4
        with:
          name: release-web-linux
          path: release-assets/release-web-linux

      - name: download windows web asset
        uses: actions/download-artifact@v4
        with:
          name: release-web-windows
          path: release-assets/release-web-windows

      - name: download macOS web asset
        uses: actions/download-artifact@v4
        with:
          name: release-web-macos
          path: release-assets/release-web-macos

      - name: publish GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: Kechimochi v${{ needs.validate-release.outputs.version }} Beta
          body_path: release-notes.md
          prerelease: true
          files: |
            release-assets/release-linux/kechimochi-linux-${{ needs.validate-release.outputs.version }}.AppImage
            release-assets/release-windows/kechimochi-windows-${{ needs.validate-release.outputs.version }}.msi
            release-assets/release-macos/kechimochi-macos-${{ needs.validate-release.outputs.version }}.dmg
            release-assets/release-android/kechimochi-android-${{ needs.validate-release.outputs.version }}.apk
            release-assets/release-web-linux/kechimochi-web-linux-${{ needs.validate-release.outputs.version }}.zip
            release-assets/release-web-windows/kechimochi-web-windows-${{ needs.validate-release.outputs.version }}.zip
            release-assets/release-web-macos/kechimochi-web-macos-${{ needs.validate-release.outputs.version }}.zip
