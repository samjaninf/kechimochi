name: "Test"

on:
  push:
    branches: [ "main", "setup-ci" ]
    tags:
      - 'v*.*.*'
    paths:
      - 'e2e/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - 'public/**'
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/*.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'e2e/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - 'public/**'
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/*.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: cache rust dependencies
        uses: swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: './src-tauri -> target'

      - name: install system dependencies (linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xvfb \
            webkit2gtk-driver \
            fonts-noto-cjk

      - name: install tauri-driver
        run: |
          if ! command -v tauri-driver &> /dev/null; then
            cargo install tauri-driver
          fi

      - name: typescript check
        run: npx tsc --noEmit

      - name: frontend lint check
        run: npm run lint

      - name: cargo test (backend)
        run: cargo test
        working-directory: src-tauri

      - name: cargo clippy (backend)
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

      - name: vitest and coverage
        run: npm run test:coverage

      - name: upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/

      - name: extract coverage percentage
        if: github.ref == 'refs/heads/main'
        id: coverage
        run: |
          PERCENT=$(jq -r '.total.lines.pct' coverage/coverage-summary.json)
          echo "percent=$PERCENT" >> $GITHUB_OUTPUT

      - name: update coverage badge
        if: github.ref == 'refs/heads/main'
        uses: Schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.GIST_ID }}
          filename: kechimochi-coverage.json
          label: Coverage
          message: "${{ steps.coverage.outputs.percent }}%"
          valColorRange: ${{ steps.coverage.outputs.percent }}
          maxColorRange: 100
          minColorRange: 0

      - name: build e2e debug binary
        run: npm run e2e:build

      - name: seed e2e databases
        run: npm run e2e:seed

      - name: run e2e tests
        env:
          E2E_MAX_INSTANCES: 2
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" npm run e2e:test

      - name: upload e2e logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: e2e/logs/
          if-no-files-found: ignore

  publish-dev-artifacts:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    permissions:
      contents: read
    uses: ./.github/workflows/publish.yml
    secrets:
      KECHIMOCHI_GOOGLE_CLIENT_ID: ${{ secrets.KECHIMOCHI_GOOGLE_CLIENT_ID }}
      KECHIMOCHI_GOOGLE_CLIENT_SECRET: ${{ secrets.KECHIMOCHI_GOOGLE_CLIENT_SECRET }}
      KECHIMOCHI_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.KECHIMOCHI_GOOGLE_ANDROID_CLIENT_ID }}

  android-release-build:
    if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: setup node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install node dependencies
        run: npm ci

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: cache rust dependencies
        uses: swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          workspaces: './src-tauri -> target'

      - name: setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: setup android sdk
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
        with:
          packages: 'platforms;android-36 build-tools;35.0.0 build-tools;36.0.0'

      - name: build android release apk
        env:
          KECHIMOCHI_GOOGLE_ANDROID_CLIENT_ID: release-smoke-test
          VITE_APP_VERSION: 0.0.0
          VITE_APP_CHANNEL: release
          VITE_RELEASE_STAGE: beta
        run: npm run tauri -- android build --apk --ci --target aarch64
